<style>
:root{--gold:#D4AF37}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;font-family:'Raleway',sans-serif;background:#000;color:#F0F0F0}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 80% 40% at 50% 0%,rgba(212,175,55,.04),transparent 60%);z-index:0}
.cv-tab{padding:8px 18px;background:transparent;border:1px solid rgba(212,175,55,.15);border-radius:8px;color:#888;cursor:pointer;font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;transition:all .2s;white-space:nowrap}
.cv-tab:hover{border-color:rgba(212,175,55,.3);color:#FBCB57}
.cv-tab.on{background:rgba(212,175,55,.1);border-color:rgba(212,175,55,.45);color:#D4AF37}
.card{background:#0A0800;border:1px solid rgba(212,175,55,.13);border-radius:12px;padding:16px 18px}
.ct{font-family:'Montserrat',sans-serif;font-weight:700;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#D4AF37;margin-bottom:12px}
.fi{background:#0D0B05;border:1px solid rgba(212,175,55,.15);border-radius:8px;padding:9px 12px;color:#F0F0F0;font-family:'Raleway',sans-serif;font-size:13px;outline:none;width:100%;transition:border-color .2s;line-height:1.5}
.fi:focus{border-color:rgba(212,175,55,.4)}.fi option{background:#0D0B05}
.fl{font-family:'Montserrat',sans-serif;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#444;display:block;margin-bottom:4px}
.prow{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;border:1px solid rgba(212,175,55,.08);margin-bottom:5px;transition:all .2s;background:transparent}
.prow.is-tit{border-color:rgba(75,200,138,.3);background:rgba(75,200,138,.04)}
.prow.is-remp{border-color:rgba(96,168,208,.3);background:rgba(96,168,208,.04)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#000}::-webkit-scrollbar-thumb{background:rgba(212,175,55,.2);border-radius:2px}
@media(max-width:768px){.resp-grid{grid-template-columns:1fr!important}}
</style>

<div style="max-width:1200px;margin:0 auto;padding:18px 20px;position:relative;z-index:1"><div style="display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap"><div style="font-family:Montserrat,sans-serif;font-weight:900;font-size:clamp(16px,2.5vw,24px);background:linear-gradient(135deg,#FBCB57,#D4AF37);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-right:6px">Convocations</div><button id="tab-setup" class="cv-tab on" onclick="showPhase('setup');renderSetup()">📋 Nouvelle</button><button id="tab-preview" class="cv-tab" onclick="if(CONVOC.titulaires.length)showPhase('preview')">👁 Aperçu</button><button id="tab-sent" class="cv-tab" onclick="showPhase('sent')" style="color:rgba(75,200,138,.7)">✅ Envoyée</button><button id="tab-history" class="cv-tab" onclick="renderHistory();showPhase('history')">🕑 Historique</button></div><div id="phase-setup"><div style="display:grid;grid-template-columns:1fr 2fr;gap:16px;align-items:start" class="resp-grid"><div><div class="card" style="border-top:3px solid #D4AF37;margin-bottom:12px"><div class="ct">Informations du match</div><div style="display:flex;flex-direction:column;gap:10px"><div><label class="fl">Intitulé</label><input class="fi" id="cv-titre" type="text" placeholder="Ex: FFP vs AS Voltaire"></div><div><label class="fl">Adversaire *</label><input class="fi" id="cv-adv" type="text" placeholder="Nom de l'équipe adverse"></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div><label class="fl">Date *</label><input class="fi" id="cv-date" type="date"></div><div><label class="fl">Heure match</label><input class="fi" id="cv-heure" type="text" value="18h00" placeholder="18h00"></div></div><div><label class="fl">Type</label><select class="fi" id="cv-type"><option value="championnat">Championnat</option><option value="coupe">Coupe</option><option value="amical">Amical</option><option value="tournoi">Tournoi</option></select></div><div><label class="fl">Lieu du match</label><input class="fi" id="cv-lieu" type="text" value="Terrain principal" placeholder="Adresse ou nom du terrain"></div></div></div><div class="card" style="margin-bottom:12px"><div class="ct">Rendez-vous</div><div style="display:flex;flex-direction:column;gap:10px"><div><label class="fl">Heure de RDV</label><input class="fi" id="cv-rdv" type="text" value="17h15" placeholder="Ex: 17h15"></div><div><label class="fl">Lieu de RDV</label><input class="fi" id="cv-lieu-rdv" type="text" value="Terrain principal — vestiaires"></div><div><label class="fl">Tenue requise</label><input class="fi" id="cv-tenue" type="text" value="Tenue officielle FFP (maillot, short, chaussettes, protège-tibias)"></div></div></div><div class="card"><div class="ct">Message du coach</div><textarea class="fi" id="cv-note" rows="4" style="resize:vertical" placeholder="Note personnalisée aux parents (optionnel)..."></textarea></div></div><div class="card"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px"><div class="ct" style="margin:0">Sélection de l'effectif</div><div id="squad-summary" style="font-family:Montserrat,sans-serif;font-size:11px;color:#888"></div></div><div id="squad-grid" style="max-height:580px;overflow-y:auto"></div><div style="margin-top:14px;display:flex;gap:10px;flex-wrap:wrap"><button onclick="goPreview()" style="flex:1;background:linear-gradient(135deg,#D4AF37,#FBCB57);color:#000;border:none;border-radius:8px;padding:13px;cursor:pointer;font-family:Montserrat,sans-serif;font-size:12px;font-weight:800;letter-spacing:1px;text-transform:uppercase;transition:all .2s" onmouseover="this.style.boxShadow='0 0 20px rgba(212,175,55,.4)'" onmouseout="this.style.boxShadow='none'">📋 Générer la convocation →</button></div></div></div></div><div id="phase-preview" style="display:none"><div id="convoc-preview"></div></div><div id="phase-sent" style="display:none"></div><div id="phase-history" style="display:none"><div id="history-list"></div></div></div>
<script>
// ══════════════════════════════════════════════════════
// FOOT FACTORY PRO — MODULE CONVOCATIONS
// Sélection joueurs → PDF officiel → Envoi parents
// ══════════════════════════════════════════════════════

var LS_CONVOC   = 'ffp_convocations';
var LS_MESSAGES = 'ffp_messages';
var LS_SESSION  = 'ffp_session';

var PN=['Thomas','Arthur','Sacha','Kylian','Léo','Hugo','Mathieu','Théo','Enzo','Nathan',
        'Lucas','Antoine','Maxime','Julien','Baptiste','Romain','Pierre','Clément','Nicolas','Valentin',
        'Alexis','Quentin','Louis','Gabriel','Tom','Noa','Liam','Yanis','Ryan','Axel'];
var NN=['Bernard','Morel','Renard','Faure','Dubois','Martin','Laurent','Simon','Leroy','Dupont',
        'Moreau','Petit','Richard','Robert','Durand','Leblanc','Garnier','Girard','Boyer','Rousseau',
        'Chevalier','André','Michel','Henry','Gilles','Roux','François','Blanc','Guérin','Robin'];
var POS=['Gardien','Défenseur Central','Latéral Droit','Latéral Gauche','Milieu Défensif',
         'Milieu Central','Milieu Offensif','Ailier Droit','Ailier Gauche','Avant-Centre'];
var POS_SH={'Gardien':'GK','Défenseur Central':'DC','Latéral Droit':'LD','Latéral Gauche':'LG',
            'Milieu Défensif':'MD','Milieu Central':'MC','Milieu Offensif':'MO',
            'Ailier Droit':'AD','Ailier Gauche':'AG','Avant-Centre':'AC'};
var PROFS=['elite','elite','good','good','good','good','good',
           'average','average','average','average','average','average','average','average',
           'developing','developing','developing','developing','developing','developing','developing',
           'beginner','beginner','beginner','beginner','beginner','beginner','beginner','beginner'];
var BASE={elite:8.4,good:7.0,average:5.6,developing:4.4,beginner:3.2};

function rng(s){var x=s;return function(){x=(x*1664525+1013904223)>>>0;return x/0xFFFFFFFF;};}
function mkPlayer(i){
  var r=rng(i*7919+31337);var b=BASE[PROFS[i]];var v=function(){return +Math.max(1,Math.min(10,b+(r()*4-2))).toFixed(1);};
  var sc={t:v(),p:v(),ta:v(),m:v(),c:v()};
  var g=+(sc.t*.3+sc.p*.25+sc.ta*.2+sc.m*.15+sc.c*.1).toFixed(2);
  return{id:i,prenom:PN[i],nom:NN[i],poste:POS[Math.floor(r()*POS.length)],numero:i+1,global:g,code_parent:String(1001+i)};
}
var ALL_PLAYERS=[];for(var _i=0;_i<30;_i++){ALL_PLAYERS.push(mkPlayer(_i));}
ALL_PLAYERS.sort(function(a,b){return b.global-a.global;});

// ── State ──
var CONVOC = {
  id:'',match_titre:'',adversaire:'',date:'',heure_match:'18h00',
  type:'championnat',lieu:'Terrain principal',
  heure_rdv:'17h15',lieu_rdv:'Terrain principal — vestiaires',
  tenue:'Tenue officielle FFP (maillot, short, chaussettes)',
  note_coach:'',titulaires:[],remplacants:[],
  statut:'brouillon'
};
var PHASE = 'setup'; // setup | preview | sent
var SESSION = null;

// ── Session ──
function getSession(){
  try{var r=localStorage.getItem(LS_SESSION);if(!r)return null;var d=JSON.parse(r);if(d._exp&&Date.now()>d._exp)return null;return d;}catch(e){return null;}
}

// ── Convoc storage ──
function loadConvocs(){try{return JSON.parse(localStorage.getItem(LS_CONVOC)||'[]');}catch(e){return [];}}
function saveConvoc(c){
  var list=loadConvocs();var idx=list.findIndex(function(x){return x.id===c.id;});
  if(idx>=0)list[idx]=c;else list.unshift(c);
  try{localStorage.setItem(LS_CONVOC,JSON.stringify(list));}catch(e){}
}
function genId(){return 'cv_'+Date.now();}

// ── Phase navigation ──
function showPhase(p){
  PHASE=p;
  ['setup','preview','sent','history'].forEach(function(ph){
    var el=document.getElementById('phase-'+ph);if(el)el.style.display='none';
  });
  var el=document.getElementById('phase-'+p);if(el)el.style.display='block';
  document.querySelectorAll('.cv-tab').forEach(function(b){b.classList.remove('on');});
  var btn=document.getElementById('tab-'+p);if(btn)btn.classList.add('on');
}

// ── Render setup ──
function renderSetup(){
  var el=document.getElementById('squad-select');if(!el)return;

  // Sort by position group then score
  var posOrder={'Gardien':0,'Défenseur Central':1,'Latéral Droit':2,'Latéral Gauche':3,
    'Milieu Défensif':4,'Milieu Central':5,'Milieu Offensif':6,'Ailier Droit':7,'Ailier Gauche':8,'Avant-Centre':9};
  var sorted=ALL_PLAYERS.slice().sort(function(a,b){
    var pa=posOrder[a.poste]||5,pb=posOrder[b.poste]||5;
    return pa!==pb?pa-pb:b.global-a.global;
  });

  // Auto-select 11 best (already in CONVOC if previously filled)
  if(!CONVOC.titulaires.length){
    var autoTits=ALL_PLAYERS.slice(0,11).map(function(p){return p.id;});
    CONVOC.titulaires=autoTits;
    var autoRemps=ALL_PLAYERS.slice(11,16).map(function(p){return p.id;});
    CONVOC.remplacants=autoRemps;
  }

  el.innerHTML=sorted.map(function(p){
    var isTit=CONVOC.titulaires.indexOf(p.id)>=0;
    var isRemp=CONVOC.remplacants.indexOf(p.id)>=0;
    var sc=p.global>=7.5?'#4BC88A':p.global>=6?'#D4AF37':'#888';
    return '<div class="prow'+(isTit?' is-tit':isRemp?' is-remp':'')+'" id="pr-'+p.id+'">'

function togglePlayer(id,role){
  var oppRole=role==='tit'?'remp':'tit';
  // Remove from opposite if present
  if(role==='tit'){CONVOC.remplacants=CONVOC.remplacants.filter(function(x){return x!==id;});}
  else{CONVOC.titulaires=CONVOC.titulaires.filter(function(x){return x!==id;});}
  // Toggle in current
  var arr=role==='tit'?CONVOC.titulaires:CONVOC.remplacants;
  var idx=arr.indexOf(id);
  if(idx>=0){arr.splice(idx,1);}else{
    if(role==='tit'&&arr.length>=16){alert('Maximum 16 titulaires.');var cb=document.querySelector('[data-id="'+id+'"][data-role="tit"]');if(cb)cb.checked=false;return;}
    if(role==='remp'&&arr.length>=8){alert('Maximum 8 remplaçants.');var cb2=document.querySelector('[data-id="'+id+'"][data-role="remp"]');if(cb2)cb2.checked=false;return;}
    arr.push(id);
  }
  // Sync opposite checkbox
  var oppCb=document.querySelector('[data-id="'+id+'"][data-role="'+oppRole+'"]');
  if(oppCb)oppCb.checked=false;
  // Update row style
  var row=document.getElementById('pr-'+id);
  if(row){
    row.className='prow'+(CONVOC.titulaires.indexOf(id)>=0?' is-tit':CONVOC.remplacants.indexOf(id)>=0?' is-remp':'');
  }
  updateSquadSummary();
}

function updateSquadSummary(){
  var el=document.getElementById('squad-summary');if(!el)return;
  var t=CONVOC.titulaires.length,r=CONVOC.remplacants.length;
  var hasGK=CONVOC.titulaires.some(function(id){var p=ALL_PLAYERS.find(function(x){return x.id===id;});return p&&p.poste==='Gardien';});
  el.innerHTML='<span style="color:#4BC88A;font-weight:700">'+t+'</span> titulaires'
    +' · <span style="color:#60A8D0;font-weight:700">'+r+'</span> remplaçants'
    +(t<7?'<span style="color:#E24B4A;margin-left:8px;font-weight:600">⚠ Minimum 7 requis</span>':'')
    +(!hasGK&&t>0?'<span style="color:#FBCB57;margin-left:8px;font-weight:600">⚠ Aucun gardien sélectionné</span>':'');
}

    messages.unshift({id:'cv_'+now+'_'+idx,from:'coach',from_name:coachName,
      to:String(1001+p.id),to_label:'Parent de '+p.prenom+' '+p.nom,
      subject:sujet,body:personalBody,ts:now+idx,read_by:['coach'],priority:'haute',tag:'convocation'});
  });
  try{localStorage.setItem(LS_MESSAGES,JSON.stringify(messages));}catch(e){}
  CONVOC.statut='envoyée';saveConvoc(CONVOC);
  showPhase('sent');renderSent(allPlayers.length);
}

// ── Sent confirmation ──
function renderSent(count){
  var el=document.getElementById('phase-sent');if(!el)return;
  el.innerHTML='<div style="text-align:center;padding:50px 20px">'
    +'<div style="font-size:56px;margin-bottom:16px">✅</div>'
    +'<div style="font-family:Montserrat,sans-serif;font-weight:900;font-size:22px;background:linear-gradient(135deg,#4BC88A,#D4AF37);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px">Convocation envoyée !</div>'
    +'<p style="font-size:14px;color:#888;margin-bottom:6px">'+count+' message'+(count>1?'s':'')+' envoyé'+(count>1?'s':'')+' aux parents.</p>'
    +'<p style="font-size:12px;color:#444;margin-bottom:28px">Visible dans <a href="ffp-messagerie.html" style="color:#D4AF37">la messagerie</a> pour chaque parent concerné.</p>'
    +'<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">'
      +'<button onclick="newConvoc()" style="background:linear-gradient(135deg,#D4AF37,#FBCB57);color:#000;border:none;border-radius:8px;padding:12px 22px;cursor:pointer;font-family:Montserrat,sans-serif;font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase">+ Nouvelle convocation</button>'
      +'<a href="ffp-messagerie.html" style="display:inline-flex;align-items:center;background:rgba(75,200,138,.1);border:1px solid rgba(75,200,138,.3);border-radius:8px;color:#4BC88A;padding:12px 20px;font-family:Montserrat,sans-serif;font-size:11px;font-weight:700;text-decoration:none;text-transform:uppercase">✉️ Voir messagerie →</a>'
      +'<button onclick="renderHistory();showPhase(\'history\')" style="background:transparent;border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#888;padding:12px 16px;cursor:pointer;font-family:Montserrat,sans-serif;font-size:11px;font-weight:600">Historique</button>'
    +'</div>'
  +'</div>';
}

// ── History ──
function renderHistory(){
  var el=document.getElementById('phase-history');if(!el)return;
  var list=loadConvocs();
  if(!list.length){el.innerHTML='<div style="text-align:center;padding:40px;color:#444;font-size:13px">Aucune convocation enregistrée.</div>';return;}
  el.innerHTML='<div style="display:flex;flex-direction:column;gap:10px">'
    +list.map(function(c){
      var sc=c.statut==='envoyée'?'#4BC88A':'#D4AF37';
      return '<div style="background:#0A0800;border:1px solid rgba(212,175,55,.12);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">'
        +'<div style="flex:1"><div style="font-size:13px;font-weight:600">'+c.match_titre+'</div>'
        +'<div style="font-size:11px;color:#888;margin-top:2px">'+c.adversaire+' · '+c.date+'</div></div>'
        +'<div style="display:flex;gap:8px;align-items:center">'
          +'<span style="font-size:10px;background:'+sc+'22;border:1px solid '+sc+'44;border-radius:8px;padding:2px 9px;color:'+sc+';font-family:Montserrat,sans-serif;font-weight:700">'+c.statut+'</span>'
          +'<span style="font-size:11px;color:#444;font-family:Montserrat,sans-serif">'+c.titulaires.length+' tit · '+c.remplacants.length+' remp</span>'
          +'<button onclick="loadConvoc(\''+c.id+'\')" style="background:rgba(212,175,55,.07);border:1px solid rgba(212,175,55,.2);border-radius:6px;color:#D4AF37;padding:5px 10px;cursor:pointer;font-family:Montserrat,sans-serif;font-size:9px;font-weight:700;text-transform:uppercase">Recharger</button>'
          +'<button onclick="exportFromHistory(\''+c.id+'\')" style="background:rgba(96,168,208,.07);border:1px solid rgba(96,168,208,.2);border-radius:6px;color:#60A8D0;padding:5px 10px;cursor:pointer;font-family:Montserrat,sans-serif;font-size:9px;font-weight:700;text-transform:uppercase">PDF</button>'
        +'</div>'
      +'</div>';
    }).join('')
  +'</div>';
}

function loadConvoc(id){
  var list=loadConvocs();var c=list.find(function(x){return x.id===id;});
  if(!c)return;
  CONVOC=c;showPhase('setup');
  setTimeout(function(){
    var fields={titre:'cv-titre',adversaire:'cv-adv',date:'cv-date',heure_match:'cv-heure',
      type:'cv-type',lieu:'cv-lieu',heure_rdv:'cv-rdv',lieu_rdv:'cv-lieu-rdv',tenue:'cv-tenue',note_coach:'cv-note'};
    Object.keys(fields).forEach(function(k){
      var el=document.getElementById(fields[k]);if(el&&CONVOC[k])el.value=CONVOC[k];
    });
    renderSetup();
  },100);
}

function exportFromHistory(id){
  var list=loadConvocs();var c=list.find(function(x){return x.id===id;});
  if(!c)return;var prev=CONVOC;CONVOC=c;exportConvocPDF();CONVOC=prev;
}

function newConvoc(){
  CONVOC={id:'',match_titre:'',adversaire:'',date:new Date().toISOString().slice(0,10),heure_match:'18h00',
    type:'championnat',lieu:'Terrain principal',heure_rdv:'17h15',lieu_rdv:'Terrain principal — vestiaires',
    tenue:'Tenue officielle FFP (maillot, short, chaussettes, protège-tibias)',note_coach:'',
    titulaires:[],remplacants:[],statut:'brouillon'};
  var autoTits=ALL_PLAYERS.slice(0,11).map(function(p){return p.id;});
  CONVOC.titulaires=autoTits;
  CONVOC.remplacants=ALL_PLAYERS.slice(11,16).map(function(p){return p.id;});
  showPhase('setup');
  var dateEl=document.getElementById('cv-date');if(dateEl)dateEl.value=CONVOC.date;
  renderSetup();
}

function init(){
  SESSION=getSession();
  newConvoc();
  renderHistory();
}
init();

var dateEl=document.getElementById("cv-date");if(dateEl)dateEl.value=new Date().toISOString().slice(0,10);
</script>
<script>if("serviceWorker" in navigator)navigator.serviceWorker.register("ffp-sw.js").catch(function(){});</script>
</body>
