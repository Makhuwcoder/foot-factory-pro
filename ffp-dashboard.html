<script>
(function(){
  // FFP AUTH GUARD v3 — synchrone
  var LS='ffp_session',LSC='ffp_scout_session';
  var roles=['coach','directeur','parent','scout'];
  function get(k){try{var r=localStorage.getItem(k);if(!r)return null;var d=JSON.parse(r);if(d&&d._exp&&Date.now()>d._exp){localStorage.removeItem(k);return null;}return d;}catch(e){return null;}}
  var s=get(LS);
  if(!s&&roles.indexOf('scout')>=0){s=get(LSC);if(s)try{localStorage.setItem(LS,JSON.stringify(s));}catch(e){}}
  if(!s){window.location.replace('ffp-login.html');return;}
  if(roles.length>0&&roles.indexOf(s.role)<0){window.location.replace('ffp-login.html');return;}
})();
</script>
<script>
// ── FFP AUTH GUARD (inline synchrone) ──
(function(){
  var LS = 'ffp_session';
  var LS_SC = 'ffp_scout_session';
  var roles = ['coach','directeur','parent','scout'];
  
  // Mode démo: ?demo=... → laisser passer (ffp-auth.js gère la session)
  if (window.location.search.indexOf('demo=') >= 0) return;
  
  // Vérifier session
  function getSess(key) {
    try {
      var r = localStorage.getItem(key);
      if (!r) return null;
      var d = JSON.parse(r);
      if (!d) return null;
      if (d._exp && Date.now() > d._exp) { localStorage.removeItem(key); return null; }
      return d;
    } catch(e) { return null; }
  }
  
  var sess = getSess(LS);
  
  // Scout: accepter aussi ffp_scout_session
  if (!sess && roles.indexOf('scout') >= 0) {
    sess = getSess(LS_SC);
    if (sess) { localStorage.setItem(LS, JSON.stringify(sess)); }
  }
  
  // Pas de session → login
  if (!sess) {
    window.location.replace('ffp-login.html');
    return;
  }
  
  // Mauvais rôle → login
  if (roles.length > 0 && roles.indexOf(sess.role) < 0) {
    window.location.replace('ffp-login.html');
  }
})();
</script>

<script>
// ══════════════════════════════════════════════════════
// FOOT FACTORY PRO — TABLEAU DE BORD UNIFIÉ
// S'adapte au rôle : coach / parent / scout
// ══════════════════════════════════════════════════════

var LS_SESSION  = 'ffp_session';
var LS_EVAL     = 'ffp_eval';
var LS_EVENTS   = 'ffp_events';
var LS_MESSAGES = 'ffp_messages';
var LS_MATCHES  = 'ffp_matches';
var LS_SHORTLIST= 'ffp_scout_shortlist';

var PN=['Thomas','Arthur','Sacha','Kylian','Léo','Hugo','Mathieu','Théo','Enzo','Nathan',
        'Lucas','Antoine','Maxime','Julien','Baptiste','Romain','Pierre','Clément','Nicolas','Valentin',
        'Alexis','Quentin','Louis','Gabriel','Tom','Noa','Liam','Yanis','Ryan','Axel'];
var NN=['Bernard','Morel','Renard','Faure','Dubois','Martin','Laurent','Simon','Leroy','Dupont',
        'Moreau','Petit','Richard','Robert','Durand','Leblanc','Garnier','Girard','Boyer','Rousseau',
        'Chevalier','André','Michel','Henry','Gilles','Roux','François','Blanc','Guérin','Robin'];
var POS=['Gardien','Défenseur Central','Latéral Droit','Latéral Gauche','Milieu Défensif',
         'Milieu Central','Milieu Offensif','Ailier Droit','Ailier Gauche','Avant-Centre'];

function rng(s){var x=s;return function(){x=(x*1664525+1013904223)>>>0;return x/0xFFFFFFFF;};}
function mkPlayer(i){
  var r=rng(i*7919+31337);var b=[8.4,8.4,7,7,7,7,7,5.6,5.6,5.6,5.6,5.6,5.6,5.6,5.6,4.4,4.4,4.4,4.4,4.4,4.4,4.4,3.2,3.2,3.2,3.2,3.2,3.2,3.2,3.2][i];
  var v=function(){return +Math.max(1,Math.min(10,b+(r()*4-2))).toFixed(1);};
  var sc={t:v(),p:v(),ta:v(),m:v(),c:v()};
  var g=+(sc.t*.3+sc.p*.25+sc.ta*.2+sc.m*.15+sc.c*.1).toFixed(2);
  return{id:i,prenom:PN[i],nom:NN[i],poste:POS[Math.floor(r()*POS.length)],numero:i+1,global:g,
    scores:{technique:sc.t,physique:sc.p,tactique:sc.ta,mental:sc.m,culture:sc.c}};
}
var ALL_PLAYERS=[];for(var _i=0;_i<30;_i++){ALL_PLAYERS.push(mkPlayer(_i));}
ALL_PLAYERS.sort(function(a,b){return b.global-a.global;});
ALL_PLAYERS.forEach(function(p,i){p.rank=i+1;});

// ── Helpers ──
function fmtDate(ts){
  var d=new Date(ts);var now=new Date();var diff=Math.floor((now-d)/1000);
  if(diff<60)return 'à l\'instant';if(diff<3600)return Math.floor(diff/60)+'min';
  if(diff<86400)return Math.floor(diff/3600)+'h';
  var days=Math.floor(diff/86400);return days===1?'hier':days+'j';
}
function fmtDateShort(ts){
  return new Date(ts).toLocaleDateString('fr-FR',{day:'2-digit',month:'short'});
}
function scoreCol(s){return s>=7.5?'#4BC88A':s>=6?'#D4AF37':s>=5?'#C89020':'#888';}

// ── Session ──
function getSession(){
  try{var r=localStorage.getItem(LS_SESSION);if(!r)return null;var d=JSON.parse(r);if(d._exp&&Date.now()>d._exp)return null;return d;}catch(e){return null;}
}
function clearSession(){
  try{localStorage.removeItem(LS_SESSION);}catch(e){}
  window.location.href='ffp-login.html';
}

// ── Data helpers ──
function getMessages(){
  try{return JSON.parse(localStorage.getItem(LS_MESSAGES)||'[]');}catch(e){return [];}
}
function getMatches(){
  try{return JSON.parse(localStorage.getItem(LS_MATCHES)||'[]');}catch(e){return [];}
}
function getEvents(){
  try{
    var raw=localStorage.getItem(LS_EVENTS);
    if(!raw){
      // Génère des événements démo
      var evts=[];var types=['match','entrainement','tournoi','stage','réunion'];
      var lieux=['Terrain principal','Terrain annexe','Gymnase','Salle de réunion','Complexe sportif'];
      for(var i=0;i<8;i++){
        var d=new Date();d.setDate(d.getDate()+i*3+Math.floor(Math.random()*3));
        var r2=rng(i*1337+42);
        evts.push({id:'ev'+i,type:types[Math.floor(r2()*types.length)],
          titre:['Match FFP vs AS Voltaire','Entraînement technique','Tournoi Régional U12',
            'Stage présaison','Réunion parents','Match retour','Entraînement physique','Coupe District'][i],
          date:d.toISOString().slice(0,10),heure:['17h30','18h00','09h00','08h30','19h00','16h00','17h30','14h00'][i],
          lieu:lieux[Math.floor(r2()*lieux.length)]});
      }
      return evts;
    }
    return JSON.parse(raw);
  }catch(e){return [];}
}
function getUnreadCount(session){
  var msgs=getMessages();
  var id=session.role==='coach'?'coach':'parent_'+(session.player_code||'');
  return msgs.filter(function(m){
    var visible=session.role==='coach'?(m.from==='parent'):(m.from==='coach'&&(m.to==='all'||m.to===session.player_code));
    return visible&&m.read_by.indexOf(id)<0;
  }).length;
}

// ── COACH DASHBOARD ──────────────────────────────────────────────
function renderCoachDashboard(session, el){
  var players=ALL_PLAYERS;
  var matches=getMatches();
  var events=getEvents();
  var unread=getUnreadCount(session);
  var upcoming=events.filter(function(e){return new Date(e.date)>=new Date();}).slice(0,4);
  var recentMatches=matches.slice(0,3);

  // Eval progress
  try{var ev=JSON.parse(localStorage.getItem(LS_EVAL)||'{}');
    var evalDone=Object.keys(ev).length;}catch(e){var evalDone=0;}

  var avgScore=+(players.reduce(function(s,p){return s+p.global;},0)/players.length).toFixed(2);
  var topPlayers=players.slice(0,5);

  var kpis=[
    {l:'Joueurs',v:players.length,i:'⚽',c:'#D4AF37',href:'ffp-coach.html'},
    {l:'Évalués',v:evalDone,i:'📊',c:'#4BC88A',href:'ffp-coach.html'},
    {l:'Score moyen',v:avgScore,i:'🎯',c:'#60A8D0',href:'ffp-media.html'},
    {l:'Non lus',v:unread,i:'✉️',c:unread>0?'#E24B4A':'#888',href:'ffp-messagerie.html'},
    {l:'Matchs',v:matches.length,i:'🏆',c:'#A060E0',href:'ffp-match.html'},
    {l:'Événements',v:upcoming.length,i:'📅',c:'#C89020',href:'ffp-vie-club.html'},
  ];

  el.innerHTML=
  // Welcome
  '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px">'
    +'<div>'
      +'<div style="font-family:Montserrat,sans-serif;font-weight:900;font-size:clamp(18px,3vw,26px);background:linear-gradient(135deg,#FBCB57,#D4AF37);-webkit-background-clip:text;-webkit-text-fill-color:transparent">Bonjour, '+(session.prenom||'Coach')+'</div>'

      content.innerHTML='<div style="text-align:center;padding:60px 20px">'
        +'<div style="font-family:Montserrat,sans-serif;font-weight:900;font-size:22px;color:#D4AF37;margin-bottom:12px">Accédez à votre espace</div>'
        +'<p style="color:#888;margin-bottom:28px;font-size:14px">Connectez-vous pour accéder à votre tableau de bord personnalisé</p>'
        +'<div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">'
          +'<a href="ffp-login.html?role=coach" style="background:linear-gradient(135deg,#D4AF37,#FBCB57);color:#000;border:none;border-radius:9px;padding:14px 28px;cursor:pointer;font-family:Montserrat,sans-serif;font-size:12px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;text-decoration:none">🏟️ Coach</a>'
          +'<a href="ffp-login.html?role=parent" style="background:transparent;color:#D4AF37;border:1px solid rgba(212,175,55,.4);border-radius:9px;padding:14px 28px;font-family:Montserrat,sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;text-decoration:none">🫂 Parents</a>'
          +'<a href="ffp-scout.html" style="background:transparent;color:#60A8D0;border:1px solid rgba(96,168,208,.4);border-radius:9px;padding:14px 28px;font-family:Montserrat,sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;text-decoration:none">🔍 Recruteurs</a>'
        +'</div>'
      +'</div>';
    }
    // Update header
    var pill=document.getElementById('session-pill');
    if(pill)pill.innerHTML='<a href="ffp-login.html" style="background:linear-gradient(135deg,#D4AF37,#FBCB57);color:#000;border:none;border-radius:7px;padding:7px 14px;font-family:Montserrat,sans-serif;font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;text-decoration:none">Connexion →</a>';
    return;
  }

  // Update header with session info
  var pill=document.getElementById('session-pill');
  var role=session.role;var roleInfo={coach:{ico:'🏟️',col:'#4BC88A',label:'Coach'},parent:{ico:'🫂',col:'#A060E0',label:'Parent'},scout:{ico:'🔍',col:'#60A8D0',label:'Recruteurs'}}[role]||{ico:'👤',col:'#888',label:role};
  if(pill){
    pill.innerHTML='<div style="display:flex;align-items:center;gap:8px">'
      +'<div style="display:flex;align-items:center;gap:6px;background:'+roleInfo.col+'15;border:1px solid '+roleInfo.col+'44;border-radius:8px;padding:5px 11px">'
        +'<span style="font-size:14px">'+roleInfo.ico+'</span>'
        +'<div style="line-height:1.2"><div style="font-family:Montserrat,sans-serif;font-size:10px;font-weight:700;color:'+roleInfo.col+'">'+( session.prenom||'')+' '+(session.nom||'')+'</div>'
        +'<div style="font-size:9px;color:#444;text-transform:uppercase;font-family:Montserrat,sans-serif;font-weight:600">'+roleInfo.label+'</div></div>'
      +'</div>'
      +'<button onclick="clearSession()" style="background:transparent;border:1px solid rgba(255,255,255,.1);border-radius:6px;color:#888;padding:5px 9px;cursor:pointer;font-family:Montserrat,sans-serif;font-size:9px;font-weight:600;text-transform:uppercase">Déco.</button>'
    +'</div>';
  }

  // Render by role
  if(!content)return;
  if(role==='coach')renderCoachDashboard(session,content);
  else if(role==='parent')renderParentDashboard(session,content);
  else if(role==='scout')renderRecruteursDashboard(session,content);
  else content.innerHTML='<div style="text-align:center;padding:40px;color:#888">Rôle non reconnu.</div>';
}

init();

</script>
