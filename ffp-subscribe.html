function getParam(name) {
  var url = new URL(window.location.href);
  return url.searchParams.get(name) || '';
}

function init() {
  var plan = getParam('plan') || 'club_base';
  var coaches = parseInt(getParam('coaches')) || 3;
  var email = getParam('email');
  var club = getParam('club');
  var info = PLANS[plan] || PLANS.club_base;

  // Calculer montant réel (club avec coaches supplémentaires)
  var amount = info.amount;
  if (plan === 'club_base' && coaches > 3) {
    var extra = coaches - 3;
    amount = (29.90 + extra).toFixed(2).replace('.', ',');
  }

  // Afficher les infos
  var planName = document.getElementById('plan-name');
  var planAmount = document.getElementById('plan-amount');
  var planPeriod = document.getElementById('plan-period');
  var planDesc = document.getElementById('plan-desc');
  var planEmail = document.getElementById('plan-email');
  var planClub = document.getElementById('plan-club');

  if (planName) planName.textContent = info.name;
  if (planAmount) planAmount.textContent = amount + '€';
  if (planPeriod) planPeriod.textContent = '/' + info.period;
  if (planDesc) planDesc.textContent = info.desc;
  if (planEmail && email) planEmail.textContent = email;
  if (planClub && club) planClub.textContent = club;
}
