<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FFP — Superadmin</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800;900&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--gold:#D4AF37;--gold-l:#FBCB57;--bg:#050400;--bg2:#0A0800;--bg3:#111006;--text:#F0EEE8;--muted:#888;--border:rgba(212,175,55,.12);--red:#E24B4A;--green:#4BC88A;--blue:#60A8D0}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;font-family:'Raleway',sans-serif;background:var(--bg);color:var(--text)}
/* LOGIN */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(212,175,55,.06),transparent 60%)}
.login-card{background:var(--bg2);border:1px solid rgba(212,175,55,.3);border-radius:16px;padding:40px;width:min(400px,92vw);text-align:center}
.inp{width:100%;background:#111;border:1px solid rgba(212,175,55,.2);border-radius:8px;padding:12px 14px;color:var(--text);font-family:'Raleway',sans-serif;font-size:13px;outline:none;margin-bottom:10px;transition:border-color .2s}
.inp:focus{border-color:rgba(212,175,55,.5)}
.btn-gold{width:100%;background:linear-gradient(135deg,#D4AF37,#FBCB57);color:#000;border:none;border-radius:8px;padding:13px;cursor:pointer;font-family:'Montserrat',sans-serif;font-size:12px;font-weight:800;letter-spacing:2px;text-transform:uppercase;transition:all .25s}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(212,175,55,.3)}
/* LAYOUT */
.app{display:none;min-height:100vh}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:50}
.sidebar-logo{padding:18px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sidebar-brand{font-family:'Montserrat',sans-serif;font-weight:900;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;background:linear-gradient(135deg,#FBCB57,#D4AF37);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sidebar-sub{font-size:8px;color:var(--red);font-family:'Montserrat',sans-serif;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.nav-items{flex:1;padding:12px 8px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;margin-bottom:2px;transition:all .2s;font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
.nav-item:hover{background:rgba(212,175,55,.06);color:var(--text)}
.nav-item.active{background:rgba(212,175,55,.1);color:var(--gold);border:1px solid rgba(212,175,55,.2)}
.nav-ico{width:20px;text-align:center;font-size:14px}
.sidebar-footer{padding:12px;border-top:1px solid var(--border)}
.main{margin-left:220px;padding:24px;min-height:100vh}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:10px}
.page-title{font-family:'Montserrat',sans-serif;font-weight:900;font-size:20px;background:linear-gradient(135deg,#FBCB57,#D4AF37);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:1px;text-transform:uppercase}
.live-badge{display:flex;align-items:center;gap:6px;font-family:'Montserrat',sans-serif;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--green);background:rgba(75,200,138,.1);border:1px solid rgba(75,200,138,.3);border-radius:5px;padding:4px 10px}
.dot-live{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
/* CARDS */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:24px}
.kpi-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px;position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kpi-val{font-family:'Montserrat',sans-serif;font-weight:900;font-size:32px;line-height:1;margin-bottom:4px}
.kpi-lbl{font-family:'Montserrat',sans-serif;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.kpi-trend{font-size:10px;font-weight:600;margin-top:6px}
/* TABLE */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px}
.card-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.card-title{font-family:'Montserrat',sans-serif;font-weight:800;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--gold)}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{padding:10px 14px;text-align:left;font-family:'Montserrat',sans-serif;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:11px 14px;font-size:12px;border-bottom:1px solid rgba(255,255,255,.03)}
tr:hover td{background:rgba(212,175,55,.02)}
tr:last-child td{border-bottom:none}
/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;border-radius:5px;padding:2px 8px;font-family:'Montserrat',sans-serif;font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.badge-green{background:rgba(75,200,138,.12);color:var(--green);border:1px solid rgba(75,200,138,.3)}
.badge-gold{background:rgba(212,175,55,.12);color:var(--gold);border:1px solid rgba(212,175,55,.3)}
.badge-red{background:rgba(226,75,74,.12);color:var(--red);border:1px solid rgba(226,75,74,.3)}
.badge-blue{background:rgba(96,168,208,.12);color:var(--blue);border:1px solid rgba(96,168,208,.3)}
.badge-gray{background:rgba(255,255,255,.05);color:var(--muted);border:1px solid rgba(255,255,255,.1)}
/* FORMS */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-label{font-family:'Montserrat',sans-serif;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
.form-input{background:#111;border:1px solid rgba(212,175,55,.2);border-radius:7px;padding:9px 12px;color:var(--text);font-size:12px;outline:none;transition:border-color .2s}
.form-input:focus{border-color:rgba(212,175,55,.5)}
.btn-sm{padding:6px 12px;border:none;border-radius:6px;cursor:pointer;font-family:'Montserrat',sans-serif;font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,#D4AF37,#FBCB57);color:#000}
.btn-danger{background:rgba(226,75,74,.15);color:var(--red);border:1px solid rgba(226,75,74,.3)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
/* SEARCH */
.search-bar{display:flex;gap:8px;align-items:center}
.search-inp{background:#111;border:1px solid var(--border);border-radius:7px;padding:7px 12px;color:var(--text);font-size:12px;outline:none;min-width:200px}
.search-inp:focus{border-color:rgba(212,175,55,.3)}
/* CHART placeholder */
.chart-bar-wrap{display:flex;align-items:flex-end;gap:4px;height:80px;padding:0 4px}
.chart-bar{flex:1;background:rgba(212,175,55,.2);border-radius:3px 3px 0 0;transition:all .3s;cursor:pointer;position:relative}
.chart-bar:hover{background:rgba(212,175,55,.5)}
.chart-bar .tooltip{display:none;position:absolute;top:-24px;left:50%;transform:translateX(-50%);background:#000;color:var(--gold);padding:2px 6px;border-radius:4px;font-size:9px;white-space:nowrap;font-family:'Montserrat',sans-serif;font-weight:700}
.chart-bar:hover .tooltip{display:block}
/* RESPONSIVE */
@media(max-width:768px){.sidebar{width:60px}.sidebar-brand,.sidebar-sub,.nav-item span{display:none}.main{margin-left:60px}.form-row{grid-template-columns:1fr}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#000}::-webkit-scrollbar-thumb{background:rgba(212,175,55,.2);border-radius:2px}
.page{display:none}.page.active{display:block}
</style>
</head>

// ── Auth admin ──────────────────────────────────────────────────
function adminLogin() {
  var pass = document.getElementById('admin-pass').value;
  var err = document.getElementById('login-err');
  if (pass === ADMIN_PASS) {
    try { sessionStorage.setItem('ffp_admin', '1'); } catch(e) {}
    document.getElementById('login-wrap').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadPage('dashboard');
  } else {
    err.textContent = 'Mot de passe incorrect.';
    err.style.color = '#E24B4A';
  }
}

function adminLogout() {
  try { sessionStorage.removeItem('ffp_admin'); } catch(e) {}
  location.reload();
}

// ── Supabase fetch ──────────────────────────────────────────────
async function sb(table, params) {
  try {
    var url = SUPABASE_URL + '/rest/v1/' + table + '?' + (params || 'limit=500&order=created_at.desc');
    var res = await fetch(url, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'return=representation'
      }
    });
    if (!res.ok) return [];
    return await res.json();
  } catch(e) { return []; }
}

async function sbCount(table) {
  try {
    var url = SUPABASE_URL + '/rest/v1/' + table + '?select=count';
    var res = await fetch(url, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Prefer': 'count=exact'
      }
    });
    var count = res.headers.get('content-range');
    if (count) return parseInt(count.split('/')[1]) || 0;
    var data = await res.json();
    return Array.isArray(data) ? data.length : 0;
  } catch(e) { return 0; }
}

// ── Navigation ──────────────────────────────────────────────────
function loadPage(page) {
  CURRENT_PAGE = page;
  document.querySelectorAll('.nav-item').forEach(function(n) {
    n.classList.toggle('active', n.dataset.page === page);
  });
  document.querySelectorAll('.page').forEach(function(p) {
    p.classList.toggle('active', p.id === 'page-' + page);
  });
  var titles = {
    dashboard:'Tableau de bord',clubs:'Clubs & Abonnements',
    users:'Utilisateurs',stats:'Statistiques',security:'Sécurité'
  };
  document.getElementById('page-title').textContent = titles[page] || page;
  
  if (page === 'dashboard') loadDashboard();
  else if (page === 'clubs') loadClubs();
  else if (page === 'users') loadUsers();
  else if (page === 'stats') loadStats();
  else if (page === 'security') loadSecurity();
}

function kpi(label, val, color, ico, trend) {
  return '<div class="kpi-card" style="border-top-color:'+color+'">'
    + '<div style="display:flex;justify-content:space-between;align-items:flex-start">'
    + '<div><div class="kpi-val" style="color:'+color+'">'+val+'</div>'
    + '<div class="kpi-lbl">'+label+'</div>'
    + (trend?'<div class="kpi-trend" style="color:var(--muted)">'+trend+'</div>':'')
    + '</div><div style="font-size:24px;opacity:.4">'+ico+'</div></div></div>';
}

function roleBadge(role) {
  var map = {coach:'badge-gold',parent:'badge-blue',scout:'badge-green',recruteur:'badge-green',directeur:'badge-red',superadmin:'badge-red'};
  var cls = map[role] || 'badge-gray';
  return '<span class="badge '+cls+'">'+( role||'–')+'</span>';
}

            +'</td></tr>';}).join('')||'<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:30px">Aucun utilisateur</td></tr>'}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

// ── STATS ───────────────────────────────────────────────────────

      ${Object.keys(roles).map(function(r){return kpi(r, roles[r], '#D4AF37', '👤', '');}).join('')}

          ${Object.keys(roles).map(function(r){

              +'<div style="display:flex;justify-content:space-between;margin-bottom:4px">'
              +'<span style="font-family:Montserrat,sans-serif;font-size:10px;font-weight:700;text-transform:uppercase">'+r+'</span>'
              +'<span style="font-family:Montserrat,sans-serif;font-size:10px;color:var(--gold)">'+roles[r]+' ('+pct+'%)</span>'
              +'</div>'
              +'<div style="height:4px;background:#1A1A1A;border-radius:2px">'
              +'<div style="height:100%;background:linear-gradient(90deg,#D4AF37,#FBCB57);border-radius:2px;width:'+pct+'%"></div>'

              +'<span style="font-size:11px;color:var(--muted)">'+r[0]+'</span>'

// ── HELPERS ─────────────────────────────────────────────────────
function filterTable(tbodyId, inputId) {
  var q = document.getElementById(inputId).value.toLowerCase();
  document.querySelectorAll('#'+tbodyId+' tr').forEach(function(tr){
    var text = tr.textContent.toLowerCase();
    tr.style.display = text.includes(q) ? '' : 'none';
  });
}

function filterByRole(role) {
  document.querySelectorAll('#user-tbody tr').forEach(function(tr){
    tr.style.display = (!role || tr.dataset.role === role) ? '' : 'none';
  });
}

function viewUser(id) {
  alert('Profil Supabase ID: ' + id + '\n\nVoir dans: app.supabase.com → Table Editor → profiles');
}

function viewClub(id) {
  alert('Club ID: ' + id + '\n\nVoir dans: app.supabase.com → Table Editor → clubs');
}

function resetPass(id, username) {
  if (confirm('Réinitialiser le mot de passe de ' + username + ' ?')) {
    // En production: appel Supabase Admin API
    alert('Pour réinitialiser:\n1. Aller sur app.supabase.com\n2. Authentication → Users\n3. Trouver: ' + username + '@footfactorypro.app\n4. Actions → Reset password');
  }
}

function changeAdminPass() {
  var np = document.getElementById('new-pass').value;
  var cp = document.getElementById('confirm-pass').value;
  var msg = document.getElementById('pass-msg');
  if (np.length < 12) { msg.style.color='var(--red)'; msg.textContent='Minimum 12 caractères.'; return; }
  if (np !== cp) { msg.style.color='var(--red)'; msg.textContent='Les mots de passe ne correspondent pas.'; return; }
  ADMIN_PASS = np;
  msg.style.color='var(--green)'; msg.textContent='✓ Mot de passe mis à jour (session uniquement).';
}

function showAddClub() {
  alert('Ajout de club: utilisez Supabase directement (app.supabase.com → Table Editor → clubs → Insert row)');
}
