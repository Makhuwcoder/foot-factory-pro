<script>
(function(){
  // FFP AUTH GUARD v3 — synchrone
  var LS='ffp_session',LSC='ffp_scout_session';
  var roles=['parent'];
  function get(k){try{var r=localStorage.getItem(k);if(!r)return null;var d=JSON.parse(r);if(d&&d._exp&&Date.now()>d._exp){localStorage.removeItem(k);return null;}return d;}catch(e){return null;}}
  var s=get(LS);
  if(!s&&roles.indexOf('scout')>=0){s=get(LSC);if(s)try{localStorage.setItem(LS,JSON.stringify(s));}catch(e){}}
  if(!s){window.location.replace('ffp-login.html');return;}
  if(roles.length>0&&roles.indexOf(s.role)<0){window.location.replace('ffp-login.html');return;}
})();
</script>
<script>
// ── FFP AUTH GUARD (inline synchrone) ──
(function(){
  var LS = 'ffp_session';
  var LS_SC = 'ffp_scout_session';
  var roles = ['parent'];
  
  // Mode démo: ?demo=... → laisser passer (ffp-auth.js gère la session)
  if (window.location.search.indexOf('demo=') >= 0) return;
  
  // Vérifier session
  function getSess(key) {
    try {
      var r = localStorage.getItem(key);
      if (!r) return null;
      var d = JSON.parse(r);
      if (!d) return null;
      if (d._exp && Date.now() > d._exp) { localStorage.removeItem(key); return null; }
      return d;
    } catch(e) { return null; }
  }
  
  var sess = getSess(LS);
  
  // Scout: accepter aussi ffp_scout_session
  if (!sess && roles.indexOf('scout') >= 0) {
    sess = getSess(LS_SC);
    if (sess) { localStorage.setItem(LS, JSON.stringify(sess)); }
  }
  
  // Pas de session → login
  if (!sess) {
    window.location.replace('ffp-login.html');
    return;
  }
  
  // Mauvais rôle → login
  if (roles.length > 0 && roles.indexOf(sess.role) < 0) {
    window.location.replace('ffp-login.html');
  }
})();
</script>
<script>
(function(){
  try{
    var s=window.location.search;
    if(s.indexOf('demo=parent')>=0){
      document.addEventListener('DOMContentLoaded',function(){
        var login=document.getElementById('s-login');
        if(login)login.style.display='none';
      });
    }
  }catch(e){}
})();
</script>

<div id="s-view" style="display:none;position:relative;z-index:1"><div style="max-width:1100px;margin:0 auto;padding:20px 18px"><div id="section-confirmations" style="background:#F5F7FA;border:1px solid rgba(0,0,0,.12);border-radius:12px;padding:16px;margin-bottom:16px;display:none"></div>
<div id="view-content"></div></div></div>
<script>
// ══════════════════════════════════════════════════════
// ONE SPORT — ESPACE PARENTS v3 (fixed)
// Code parent = 1001 + index original (0-29)
// ══════════════════════════════════════════════════════
var LS_SESSION  = 'ffp_session';
var LS_MESSAGES = 'ffp_messages';
var LS_EVENTS   = 'ffp_events';

var PN=['Thomas','Arthur','Sacha','Kylian','Léo','Hugo','Mathieu','Théo','Enzo','Nathan',
        'Lucas','Antoine','Maxime','Julien','Baptiste','Romain','Pierre','Clément','Nicolas','Valentin',
        'Alexis','Quentin','Louis','Gabriel','Tom','Noa','Liam','Yanis','Ryan','Axel'];
var NN=['Bernard','Morel','Renard','Faure','Dubois','Martin','Laurent','Simon','Leroy','Dupont',
        'Moreau','Petit','Richard','Robert','Durand','Leblanc','Garnier','Girard','Boyer','Rousseau',
        'Chevalier','André','Michel','Henry','Gilles','Roux','François','Blanc','Guérin','Robin'];
var POS=['Gardien','Défenseur Central','Latéral Droit','Latéral Gauche','Milieu Défensif',
         'Milieu Central','Milieu Offensif','Ailier Droit','Ailier Gauche','Avant-Centre'];
var PROFS=['elite','elite','good','good','good','good','good',
           'average','average','average','average','average','average','average','average',
           'developing','developing','developing','developing','developing','developing','developing',
           'beginner','beginner','beginner','beginner','beginner','beginner','beginner','beginner'];
var BASE={elite:8.4,good:7.0,average:5.6,developing:4.4,beginner:3.2};
var POT={elite:'Elite',good:'Confirmé',average:'Développement',developing:'Formation',beginner:'Débutant'};
var POT_COL={elite:'#4BC88A',good:'#D4AF37',average:'#60A8D0',developing:'#C89020',beginner:'#888'};
var EXERCISES={
  technique:['Jonglerie 3×2min','Passes contre mur 10min','Contrôle balle de l\'air','Dribble slalom 5×'],
  physique:['Course fartlek 20min','Gainage 3×30s','Sauts latéraux 3×15','Sprint navette 6×'],
  tactique:['Vidéo 15min avant match','Exercice positionnement','Communication équipe'],
  mental:['Visualisation positive 5min','Routine pré-match','Journal de performance'],
  culture:['Lecture règlement FIFA','Nutrition : fruits avant entraînement','Sommeil 9h minimum']
};

function rng(s){var x=s;return function(){x=(x*1664525+1013904223)>>>0;return x/0xFFFFFFFF;};}
function clamp(v){return Math.max(1,Math.min(10,+v.toFixed(1)));}

// CODE = 1001 + original_index (fixe, indépendant du tri)
function playerCode(idx){return String(1001+idx);}

function mkPlayer(i){
  var r=rng(i*7919+31337);
  var b=BASE[PROFS[i]];
  var v=function(){return +clamp(b+(r()*4-2)).toFixed(1);};
  var poste=POS[Math.floor(r()*POS.length)];
  var naissance=new Date(2013-Math.floor(r()*2),Math.floor(r()*12),Math.floor(r()*28)+1);
  var sc={
    technique:{controle:v(),dribble:v(),frappe:v(),passe:v(),tete:v()},
    physique:{vitesse:v(),endurance:v(),force:v(),coordination:v(),souplesse:v()},
    tactique:{positionnement:v(),lecture:v(),pressing:v()},
    mental:{motivation:v(),concentration:v(),combativite:v(),leadership:v(),stress:v()},
    culture:{reglesFIFA:v(),nutrition:v(),scolaire:v(),ethique:v()}
  };
  var avg=function(c){var vals=Object.values(sc[c]);return vals.reduce(function(a,b){return a+b;},0)/vals.length;};
  var cats={
    technique:+avg('technique').toFixed(2),physique:+avg('physique').toFixed(2),
    tactique:+avg('tactique').toFixed(2),mental:+avg('mental').toFixed(2),culture:+avg('culture').toFixed(2)
  };
  var global=+(cats.technique*.3+cats.physique*.25+cats.tactique*.2+cats.mental*.15+cats.culture*.1).toFixed(2);
  return{
    idx:i,code:playerCode(i),
    prenom:PN[i],nom:NN[i],poste:poste,numero:i+1,
    dob:naissance.toISOString().slice(0,10),
    age:new Date().getFullYear()-naissance.getFullYear(),
    taille:148+Math.floor(r()*20),poids:38+Math.floor(r()*18),
    pied:r()>0.2?'Droit':'Gauche',
    scores:cats,details:sc,global:global,prof:PROFS[i]
  };
}

var ALL_PLAYERS=[];
for(var _i=0;_i<30;_i++){ALL_PLAYERS.push(mkPlayer(_i));}

// Sort for ranking but keep original index/code
var sorted=ALL_PLAYERS.slice().sort(function(a,b){return b.global-a.global;});
sorted.forEach(function(p,i){p.rank=i+1;p.equipe='Équipe '+(i<10?'1':i<20?'2':'3');});

// ── State ──
var CURRENT = null;
var PIN_CODE = ['','','',''];

// ── Session ──
function getSession(){
  try{var r=localStorage.getItem(LS_SESSION);if(!r)return null;var d=JSON.parse(r);if(d._exp&&Date.now()>d._exp){localStorage.removeItem(LS_SESSION);return null;}return d;}catch(e){return null;}
}
function saveSession(code){
  var sess={role:'parent',player_code:code,_exp:Date.now()+24*60*60*1000};
  try{localStorage.setItem(LS_SESSION,JSON.stringify(sess));}catch(e){}
}
function clearSession(){try{localStorage.removeItem(LS_SESSION);}catch(e){}window.location.href='ffp-accueil.html';}

// ── Login ──
function loginWithCode(code){
  var player=ALL_PLAYERS.find(function(p){return p.code===code;});
  if(!player){showLoginErr('Code incorrect. Vérifiez avec votre coach.');return;}
  CURRENT=player;
  saveSession(code);
  showView();
}

function showLoginErr(msg){
  var e=document.getElementById('p-err');if(e){e.textContent=msg;e.style.display='block';}
  PIN_CODE=['','','',''];
  updatePinDisplay();
  var d=document.getElementById('d0');if(d)d.focus();
}

function clearErr(){
  var e=document.getElementById('p-err');if(e){e.textContent='';e.style.display='none';}
}

// ── PIN input ──
function setupPIN(){
  for(var i=0;i<4;i++){
    (function(idx){
      var el=document.getElementById('d'+idx);if(!el)return;
      el.addEventListener('keydown',function(e){
        if(e.key>='0'&&e.key<='9'){
          PIN_CODE[idx]=e.key;
          el.value=e.key;
          clearErr();
          if(idx<3){var next=document.getElementById('d'+(idx+1));if(next)next.focus();}
          else{
            var code=PIN_CODE.join('');
            if(code.length===4)setTimeout(function(){loginWithCode(code);},150);
          }
          e.preventDefault();
        } else if(e.key==='Backspace'){
          PIN_CODE[idx]='';el.value='';
          if(idx>0){var prev=document.getElementById('d'+(idx-1));if(prev){prev.value='';prev.focus();}}
          e.preventDefault();
        } else if(e.key==='Enter'){
          var code=PIN_CODE.join('');if(code.length===4)loginWithCode(code);
        }
      });
      el.addEventListener('click',function(){el.select();});
    })(i);
  }
}

function updatePinDisplay(){
  for(var i=0;i<4;i++){var el=document.getElementById('d'+i);if(el)el.value=PIN_CODE[i]||'';}
}

// ── Screen toggle ──
function showLogin(){
  var l=document.getElementById('s-login');var v=document.getElementById('s-view');
  if(l)l.style.display='flex';if(v)v.style.display='none';
  var lb=document.getElementById('logout-btn');if(lb)lb.style.display='none';
}
function showView(){
  var l=document.getElementById('s-login');var v=document.getElementById('s-view');
  if(l)l.style.display='none';if(v){v.style.display='block';}
  var lb=document.getElementById('logout-btn');if(lb)lb.style.display='flex';
  renderPlayer();
  renderConfirmationsParent();
}

// ── Render player profile ──
function renderPlayer(){
  var p=CURRENT;if(!p)return;
  var el=document.getElementById('view-content');if(!el)return;
  renderConfirmationsParent();
  var scCol=function(s){return s>=7.5?'#4BC88A':s>=6?'#D4AF37':s>=5?'#C89020':'#888';};
  var gc=scCol(p.global);

  // Find weakest cat for exercises
  var catKeys=['technique','physique','tactique','mental','culture'];
  var weakest=catKeys.reduce(function(a,b){return p.scores[a]<p.scores[b]?a:b;});
  var exercises=EXERCISES[weakest]||EXERCISES.technique;

  // Radar SVG 5 categories
  var cats5=['TECH','PHYS','TACT','MENT','CULT'];
  var vals5=[p.scores.technique,p.scores.physique,p.scores.tactique,p.scores.mental,p.scores.culture];
  var CX=140,CY=130,R=95;
  var ang5=cats5.map(function(_,i){return -Math.PI/2+i*2*Math.PI/5;});
  var pt5=function(v,i){return [+(CX+R*(v/10)*Math.cos(ang5[i])).toFixed(1),+(CY+R*(v/10)*Math.sin(ang5[i])).toFixed(1)];};
  var radarSVG='<svg viewBox="0 0 280 260" width="100%" style="max-width:260px;display:block;margin:0 auto">'
    +[2,4,6,8,10].map(function(g){return '<polygon points="'+ang5.map(function(_,i){return pt5(g,i).join(',');}).join(' ')+'" fill="none" stroke="rgba(212,175,55,0.07)" stroke-width="1"/>';}).join('')
    +ang5.map(function(_,i){var xy=pt5(10,i);return '<line x1="'+CX+'" y1="'+CY+'" x2="'+xy[0]+'" y2="'+xy[1]+'" stroke="rgba(212,175,55,0.08)" stroke-width="1"/>';}).join('')
    +'<polygon points="'+vals5.map(function(v,i){return pt5(v,i).join(',');}).join(' ')+'" fill="rgba(212,175,55,0.12)" stroke="#D4AF37" stroke-width="2.5"/>'
    +vals5.map(function(v,i){var xy=pt5(v,i);return '<circle cx="'+xy[0]+'" cy="'+xy[1]+'" r="4.5" fill="#D4AF37" stroke="#0A0800" stroke-width="1.5"/>';}).join('')
    +cats5.map(function(c,i){var xy=pt5(13,i);return '<text x="'+xy[0]+'" y="'+xy[1]+'" text-anchor="middle" dominant-baseline="middle" font-size="9" fill="#666" font-family="Montserrat,sans-serif" font-weight="700">'+c+'</text>';}).join('')
    +'</svg>';

  // Score bars
  var catBars=catKeys.map(function(c){
    var v=p.scores[c];var col=scCol(v);
    var label={technique:'Technique',physique:'Physique',tactique:'Tactique',mental:'Mental',culture:'Culture football'}[c];
    return '<div style="margin-bottom:10px">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">'
        +'<span style="font-size:12px;font-weight:600;color:'+col+'">'+label+'</span>'
        +'<span style="font-family:Montserrat,sans-serif;font-weight:700;font-size:13px;color:'+col+'">'+v.toFixed(1)+'/10</span>'
      +'</div>'
      +'<div style="height:6px;background:#1A1A1A;border-radius:3px;overflow:hidden">'
        +'<div style="height:100%;background:'+col+';border-radius:3px;width:'+(v*10)+'%;transition:width 1s ease"></div>'
      +'</div>'
    +'</div>';
  }).join('');

  // Events
  var evtHTML='';
  try{
    var rawEvts=localStorage.getItem(LS_EVENTS);
    var evts=rawEvts?JSON.parse(rawEvts):generateDemoEvents();
    var upcoming=evts.filter(function(e){return new Date(e.date)>=new Date();}).slice(0,4);
    var ico={match:'⚽',entrainement:'🏃',tournoi:'🏆',stage:'🎯',réunion:'📋'};
    var col2={match:'#D4AF37',entrainement:'#4BC88A',tournoi:'#A060E0',stage:'#60A8D0',réunion:'#C89020'};
    if(upcoming.length){
      evtHTML=upcoming.map(function(e){
        var c=col2[e.type]||'#888';
        return '<div style="display:flex;gap:10px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.03);align-items:center">'

  var lieux=['Terrain principal','Terrain annexe','Gymnase','Complexe sportif'];
  var heures=['17h30','18h00','09h00','08h30','19h00','16h00'];
  var evts=[];
  for(var i=0;i<6;i++){
    var d=new Date();d.setDate(d.getDate()+i*5+2);
    evts.push({id:'ev'+i,type:types[i%types.length],titre:titres[i%titres.length],
      date:d.toISOString().slice(0,10),heure:heures[i%heures.length],lieu:lieux[i%lieux.length],obligatoire:i<2});
  }
  return evts;
}

function loadConfirmationsPending(codeParent) {
  try {
    var all = JSON.parse(localStorage.getItem('ffp_confirmations_pending') || '[]');
    // Filtrer les convocations où ce parent a un joueur convoqué
    return all.filter(function(c) {
      return c.joueurs && c.joueurs.some(function(j) {
        return String(j.code_parent) === String(codeParent);
      });
    });
  } catch(e) { return []; }
}

function getReponseParent(convocId, joueurId) {
  try {
    var all = JSON.parse(localStorage.getItem('ffp_reponses') || '{}');
    var rep = all[convocId] || {};
    return rep[joueurId] || null;
  } catch(e) { return null; }
}

function setReponseParent(convocId, joueurId, statut, motif) {
  try {
    var all = JSON.parse(localStorage.getItem('ffp_reponses') || '{}');
    if (!all[convocId]) all[convocId] = {};
    all[convocId][joueurId] = {
      statut: statut,
      motif: motif || '',
      par: 'parent',
      ts: Date.now()
    };
    localStorage.setItem('ffp_reponses', JSON.stringify(all));
    // Recharger la section confirmations
    renderConfirmationsParent();
  } catch(e) {}
}

function renderConfirmationsParent() {
  var el = document.getElementById('section-confirmations');
  if (!el || !CURRENT) return;
  
  var codeParent = CURRENT.code_parent || CURRENT.code;
  var convocs = loadConfirmationsPending(codeParent);
  
  // Filtrer uniquement les convocations futures (ou récentes < 24h)
  var now = Date.now();
  var actives = convocs.filter(function(c) {
    if (!c.date) return true;
    var d = new Date(c.date + 'T23:59:00').getTime();
    return d >= now - 86400000; // garder 24h après
  });
  
  if (!actives.length) {
    el.style.display = 'none';
    return;
  }
  
  el.style.display = 'block';
  
  var out = '<div style="font-family:Montserrat,sans-serif;font-weight:800;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:#1565C0;margin-bottom:12px;display:flex;align-items:center;gap:8px">'
    + '✅ Confirmations de présence'
    + '<span style="background:#E24B4A;color:#fff;border-radius:50%;width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:900">'
    + actives.filter(function(c){
        var j = c.joueurs && c.joueurs.find(function(jj){ return String(jj.code_parent)===String(codeParent); });
        return j && !getReponseParent(c.id, j.id);
      }).length
    + '</span></div>';
  
  actives.forEach(function(c) {
    var joueur = c.joueurs && c.joueurs.find(function(j) { return String(j.code_parent) === String(codeParent); });
    if (!joueur) return;
    
    var reponse = getReponseParent(c.id, joueur.id);
    var dateStr = c.date ? new Date(c.date + 'T12:00:00').toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long'}) : '–';
    
    // Couleur selon statut
    var bgCard = reponse 
      ? (reponse.statut === 'present' ? 'rgba(75,200,138,.05)' : reponse.statut === 'absent' ? 'rgba(226,75,74,.05)' : 'rgba(212,175,55,.05)')
      : 'rgba(212,175,55,.03)';
    var borderCard = reponse
      ? (reponse.statut === 'present' ? 'rgba(75,200,138,.3)' : reponse.statut === 'absent' ? 'rgba(226,75,74,.3)' : 'rgba(212,175,55,.3)')
      : 'rgba(212,175,55,.15)';
    
    // Détecter le type de confirmant
    var ct = c.confirmant_type || 'parent';
    var ctInfo = ct === 'parent' 
      ? '<span style="font-size:9px;color:#A060E0">Confirmation requise du parent (cat. ' + c.categorie + ')</span>'
      : '<span style="font-size:9px;color:#4BC88A">Confirmation joueur ou parent (cat. ' + c.categorie + ')</span>';
    
    out += '<div id="convoc-card-' + c.id + '" style="background:' + bgCard + ';border:1px solid ' + borderCard + ';border-radius:12px;padding:16px;margin-bottom:10px">';
    
    // Header de la convocation
    out += '<div style="margin-bottom:10px">'
      + '<div style="font-family:Montserrat,sans-serif;font-weight:800;font-size:14px;color:#0D1B3E;margin-bottom:2px">' + (c.titre || 'Convocation') + '</div>'
      + '<div style="font-size:11px;color:#888;margin-bottom:4px">' + dateStr + ' à ' + (c.heure || '') + '</div>'
      + ctInfo
      + '</div>';
    
    // Détails compact
    out += '<div style="background:rgba(0,0,0,.3);border-radius:8px;padding:10px;margin-bottom:12px;font-size:11px;color:#888;display:grid;grid-template-columns:1fr 1fr;gap:4px">'
      + '<div>📍 <strong style="color:#ccc">' + (c.lieu || '–') + '</strong></div>'
      + '<div>🕐 RDV ' + (c.heure_rdv || '–') + '</div>'
      + '<div>👕 ' + (c.tenue || '–') + '</div>'
      + '<div>📍 ' + (c.lieu_rdv || '–') + '</div>'
      + (c.note_coach ? '<div style="grid-column:span 2;margin-top:4px;color:#1565C0">💬 ' + c.note_coach + '</div>' : '')
      + '</div>';
    
    // Statut actuel ou boutons de confirmation
    if (reponse) {
      var statusColor = {present:'#4BC88A', absent:'#E24B4A', incertain:'#D4AF37'}[reponse.statut] || '#888';
      var statusIco = {present:'✅', absent:'❌', incertain:'⚠️'}[reponse.statut] || '⏳';
      var statusLabel = {present:'Présent(e)', absent:'Absent(e)', incertain:'Incertain(e)'}[reponse.statut] || '';
      
      out += '<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">'
        + '<div style="font-size:13px;color:' + statusColor + ';font-weight:600">' + statusIco + ' ' + joueur.prenom + ' est ' + statusLabel + '</div>';
      if (reponse.motif) {
        out += '<div style="font-size:11px;color:#64748B">Motif : ' + reponse.motif + '</div>';
      }
      // Bouton modifier
      out += '<button data-cid="' + c.id + '" data-jid="' + joueur.id + '" onclick="annulerReponse(this)" style="background:transparent;border:1px solid rgba(255,255,255,.1);border-radius:6px;color:#888;font-family:Montserrat,sans-serif;font-size:9px;font-weight:700;padding:4px 10px;cursor:pointer;text-transform:uppercase">Modifier</button>'
        + '</div>';
    } else {
      // Boutons de confirmation
      out += '<div style="margin-bottom:8px">'
        + '<div style="font-size:11px;color:#1565C0;font-weight:600;margin-bottom:8px">⚡ Répondre pour ' + joueur.prenom + ' ' + joueur.nom + '</div>'
        + '<div style="display:flex;gap:8px;flex-wrap:wrap">'
        + '<button data-cid="' + c.id + '" data-jid="' + joueur.id + '" data-statut="present" onclick="confirmerPresenceBtn(this)" style="flex:1;min-width:80px;background:linear-gradient(135deg,#1F7A4A,#4BC88A);color:#fff;border:none;border-radius:8px;padding:10px;cursor:pointer;font-family:Montserrat,sans-serif;font-size:11px;font-weight:800">✅ Présent(e)</button>'
        + '<button data-cid="' + c.id + '" data-jid="' + joueur.id + '" data-statut="absent" onclick="showMotifFormBtn(this)" style="flex:1;min-width:80px;background:linear-gradient(135deg,#7A1F1F,#E24B4A);color:#fff;border:none;border-radius:8px;padding:10px;cursor:pointer;font-family:Montserrat,sans-serif;font-size:11px;font-weight:800">❌ Absent(e)</button>'
        + '<button data-cid="' + c.id + '" data-jid="' + joueur.id + '" data-statut="incertain" onclick="showMotifFormBtn(this)" style="flex:1;min-width:80px;background:rgba(21,101,192,.1);border:1px solid rgba(21,101,192,.4);color:#1565C0;border-radius:8px;padding:10px;cursor:pointer;font-family:Montserrat,sans-serif;font-size:11px;font-weight:800">⚠️ Incertain(e)</button>'
        + '</div></div>'
        + '<div id="motif-form-' + c.id + '-' + joueur.id + '" style="display:none;margin-top:8px">'
        + '<input id="motif-input-' + c.id + '-' + joueur.id + '" type="text" placeholder="Motif (optionnel) : blessure, transport, autre..." style="width:100%;background:#111;border:1px solid rgba(0,0,0,.15);border-radius:7px;padding:9px 12px;color:#0D1B3E;font-size:12px;outline:none;margin-bottom:8px">'
        + '<div style="display:flex;gap:8px">'
        + '<button data-cid="' + c.id + '" data-jid="' + joueur.id + '" onclick="submitMotifBtn(this)" style="background:rgba(21,101,192,.08);border:1px solid rgba(21,101,192,.4);border-radius:6px;color:#1565C0;font-family:Montserrat,sans-serif;font-size:10px;font-weight:700;padding:6px 16px;cursor:pointer">Confirmer</button>'
        + '<button data-cid="' + c.id + '" data-jid="' + joueur.id + '" onclick="cancelMotifBtn(this)" style="background:transparent;border:1px solid rgba(255,255,255,.1);border-radius:6px;color:#888;font-family:Montserrat,sans-serif;font-size:10px;font-weight:600;padding:6px 12px;cursor:pointer">Annuler</button>'
        + '</div></div>';
    }
    
    out += '</div>'; // card
  });
  
  el.innerHTML = out;
}

var _pendingMotifConvocId = null;
var _pendingMotifJoueurId = null;
var _pendingMotifStatut = null;

function showMotifForm(convocId, joueurId, statut) {
  _pendingMotifConvocId = convocId;
  _pendingMotifJoueurId = joueurId;
  _pendingMotifStatut = statut;
  var f = document.getElementById('motif-form-' + convocId + '-' + joueurId);
  if (f) f.style.display = 'block';
  var inp = document.getElementById('motif-input-' + convocId + '-' + joueurId);
  if (inp) inp.focus();
}

function submitMotif(convocId, joueurId) {
  var inp = document.getElementById('motif-input-' + convocId + '-' + joueurId);
  var motif = inp ? inp.value : '';
  setReponseParent(convocId, joueurId, _pendingMotifStatut || 'absent', motif);
}

function cancelMotif(convocId, joueurId) {
  var f = document.getElementById('motif-form-' + convocId + '-' + joueurId);
  if (f) f.style.display = 'none';
}

function confirmerPresence(convocId, joueurId, statut, motif) {
  setReponseParent(convocId, joueurId, statut, motif);
}

// annulerReponse moved to wrapper

// Wrappers data-attribute pour les boutons confirmation
function confirmerPresenceBtn(btn) {
  setReponseParent(btn.dataset.cid, btn.dataset.jid, 'present', '');
}
function showMotifFormBtn(btn) {
  _pendingMotifConvocId = btn.dataset.cid;
  _pendingMotifJoueurId = btn.dataset.jid;
  _pendingMotifStatut = btn.dataset.statut;
  var f = document.getElementById('motif-form-' + btn.dataset.cid + '-' + btn.dataset.jid);
  if (f) { f.style.display = 'block'; var inp = f.querySelector('input'); if (inp) inp.focus(); }
}
function submitMotifBtn(btn) {
  var inp = document.getElementById('motif-input-' + btn.dataset.cid + '-' + btn.dataset.jid);
  var motif = inp ? inp.value : '';
  setReponseParent(btn.dataset.cid, btn.dataset.jid, _pendingMotifStatut || 'absent', motif);
}
function cancelMotifBtn(btn) {
  var f = document.getElementById('motif-form-' + btn.dataset.cid + '-' + btn.dataset.jid);
  if (f) f.style.display = 'none';
}
function annulerReponse(btn) {
  var convocId = btn.dataset.cid; var joueurId = btn.dataset.jid;
  try {
    var all = JSON.parse(localStorage.getItem('ffp_reponses') || '{}');
    if (all[convocId]) { delete all[convocId][joueurId]; }
    localStorage.setItem('ffp_reponses', JSON.stringify(all));
    renderConfirmationsParent();
  } catch(e) {}
}
</script>
